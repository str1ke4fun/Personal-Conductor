name: Release Installers

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-nsis:
    name: Build NSIS
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build NSIS installer
        shell: pwsh
        run: scripts/build-nsis.ps1

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: personal-conductor-nsis
          path: release/artifacts/*.exe
          if-no-files-found: error

  build-msi:
    name: Build MSI
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    env:
      CONDUCTOR_CERT_BASE64: ${{ secrets.CONDUCTOR_CERT_BASE64 }}
      CONDUCTOR_CERT_PASSWORD: ${{ secrets.CONDUCTOR_CERT_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Decode signing certificate
        if: env.CONDUCTOR_CERT_BASE64 != ''
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "conductor.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:CONDUCTOR_CERT_BASE64))
          "CONDUCTOR_CERT_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build MSI installer
        shell: pwsh
        run: scripts/build-msi.ps1

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: personal-conductor-msi
          path: release/artifacts/*.msi
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/artifacts/*.msi
